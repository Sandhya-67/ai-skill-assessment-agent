<!DOCTYPE html>
<html>
<head>
  <title>AI Interview Agent</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

  <!-- LEFT PANEL -->
  <div class="sidebar">

    

    <div class="card">
      <p>Upload Resume</p>
      <input type="file" id="resumeFile">
    </div>

    <div class="card">
      <p>Job Description</p>
      <textarea id="jd" placeholder="Paste JD here..."></textarea>
    </div>

  <button id="analyzeBtn" class="analyze-btn">Analyze</button> 
  <!-- <button onclick="alert('working')">Test Analyze</button> -->

    <div id="result" class="result-box"></div>

  </div>

  <!-- CENTER AREA -->
  <div class="main">

    <h1>AI Interview Agent</h1>

    <!-- AI AGENT -->
    <div id="ai-circle" class="circle"></div>

    <!-- STATUS -->
    <p id="status">Idle</p>

    <!-- CHAT -->
    <div id="chat" class="chat-box"></div>

    <!-- INPUT -->
    <div class="input-box">
      <input id="input" placeholder="Speak or type..." />
      <button onclick="sendMessage()">Send</button>
      <button onclick="startMic()">🎤</button>
      <button onclick="stopSpeaking()">Stop</button>
    </div>

  </div>

</div>

<script src="js/voice.js"></script>
<script src="js/chat.js"></script>

</body>
</html>
